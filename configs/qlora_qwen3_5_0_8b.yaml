# QLoRA fine-tuning config for Qwen3.5-0.8B-Instruct
# Student model for Query Parser (and optionally Match Explainer)
# GPU requirement: 6–8 GB VRAM (RTX 3060 / T4 / any modern GPU)

model:
  name: Qwen/Qwen3.5-0.8B-Instruct   # base: Qwen/Qwen3.5-0.8B
  max_seq_length: 2048
  load_in_4bit: true          # optional at 0.8B, but keeps VRAM low
  dtype: bfloat16

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

data:
  train_file: data/generated/train_clean.jsonl
  eval_file: eval/eval_set.jsonl
  text_field: text                # expects {"text": "<prompt>\n<response>"} format

training:
  output_dir: outputs/qwen3_5_0_8b-recruit
  num_train_epochs: 3
  per_device_train_batch_size: 8  # 0.8B can handle larger batches
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4  # effective batch = 32
  learning_rate: 2e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  fp16: false
  bf16: true
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  report_to: none               # set to "wandb" if you want experiment tracking
  seed: 42

merge:
  # After training, merge LoRA weights into base model for faster inference
  merge_and_export: true
  merged_output_dir: outputs/qwen3_5_0_8b-recruit/merged
